version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: infra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infrauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infrapass}
      POSTGRES_DB: ${POSTGRES_DB:-infra_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infrauser} -d ${POSTGRES_DB:-infra_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infra-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-infrauser}:${POSTGRES_PASSWORD:-infrapass}@db:5432/${POSTGRES_DB:-infra_db}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4782:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infra-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4782/api}
    ports:
      - "4781:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
